name: E2E

on:
  push:
    branches: [main]
  pull_request:

# Cancelar runs anteriores del mismo ref si llega un push nuevo (ahorra minutos).
concurrency:
  group: e2e-${{ github.ref }}
  cancel-in-progress: true

jobs:
  playwright:
    name: Playwright (chromium) en frontend/
    runs-on: ubuntu-latest
    timeout-minutes: 15

    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 20 (cache npm)
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install deps (npm ci)
        run: npm ci

      - name: Install Playwright browsers + deps del SO
        run: npx playwright install --with-deps chromium

      - name: Correr suite E2E
        run: npm run test:e2e

      # El reporte y los artefactos de fallo (screenshots, traces) viven en
      # frontend/. Solo se suben si algo fallo — en verde no hace falta.
      - name: Subir playwright-report como artifact
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: frontend/playwright-report/
          retention-days: 7

      - name: Subir test-results (screenshots/traces) como artifact
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-test-results
          path: frontend/test-results/
          retention-days: 7
