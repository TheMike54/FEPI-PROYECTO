services:
  db:
    image: postgres:16-alpine
    container_name: sigecop_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-sigecop}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-sigecop_dev_2026}
      POSTGRES_DB: ${POSTGRES_DB:-sigecop_db}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./backend/src/db/schema.sql:/docker-entrypoint-initdb.d/01_schema.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-sigecop} -d ${POSTGRES_DB:-sigecop_db}"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: sigecop_backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      PORT: ${BACKEND_PORT:-4000}
      DB_HOST: db
      DB_PORT: 5432
      DB_USER: ${POSTGRES_USER:-sigecop}
      DB_PASSWORD: ${POSTGRES_PASSWORD:-sigecop_dev_2026}
      DB_NAME: ${POSTGRES_DB:-sigecop_db}
      # Blindaje: el volumen ./backend:/app monta backend/.env (Render) dentro del
      # contenedor. server.js hace dotenv.config(), asi que sin esto el backend
      # local se conectaria a Render al reiniciar. Definir DATABASE_URL="" hace que
      # dotenv NO la sobreescriba (la clave ya existe) -> pool.js usa la rama DB_* local.
      DATABASE_URL: ""
      JWT_SECRET: ${JWT_SECRET:-cambiar_este_secreto_en_produccion}
    ports:
      - "${BACKEND_PORT:-4000}:4000"
    volumes:
      - ./backend:/app
      - /app/node_modules

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: sigecop_frontend
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      VITE_API_URL: ${VITE_API_URL:-http://localhost:4000/api}
    ports:
      - "${FRONTEND_PORT:-5173}:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules

volumes:
  pgdata:
    driver: local
